<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloopers* — Aayush Jain</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <style>
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Kalice Trial', serif;
      background: #FFFFFF;
      color: #000000;
      -webkit-font-smoothing: antialiased;
      max-width: 100vw;
      overflow-x: hidden;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.18;
    }

    /* Password gate */
    .password-gate {
      position: fixed;
      inset: 0;
      background: #FFFFFF;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .password-gate.hidden { display: none; }
    .password-gate input {
      font-family: 'Kalice Trial', serif;
      font-size: 22px;
      border: none;
      border-bottom: 2px solid #000000;
      outline: none;
      padding: 8px 0;
      text-align: center;
      width: 260px;
      background: transparent;
    }
    .password-gate input::placeholder {
      color: #999999;
    }
    .password-gate .error {
      color: #999999;
      font-size: 16px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .password-gate .error.show { opacity: 1; }

    /* Layout */
    .wrapper {
      max-width: 100vw;
      padding: 25px;
      min-height: 100vh;
      display: none;
    }
    .wrapper.visible { display: block; }

    .back-nav {
      position: fixed; top: 0.625vw; right: 0.625vw;
      z-index: 100; font-size: 26px; line-height: 28px;
    }
    .back-nav a { text-decoration: none; color: #000000; transition: color 0.3s ease; }
    .back-nav a:hover { color: #999999; }

    .page-title {
      font-size: 4.8vw;
      font-weight: 400;
      line-height: 5vw;
      letter-spacing: -0.1vw;
      margin-bottom: 3vw;
    }

    /* Feed grid */
    .feed {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .card {
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      aspect-ratio: 1;
    }

    .card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    /* Hover overlay */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      transition: background 0.3s ease;
      pointer-events: none;
    }
    .card:hover .card-overlay {
      background: rgba(0, 0, 0, 0.08);
    }

    /* Multi-image cards icon */
    .card-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 18px;
      height: 18px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .card:hover .card-badge {
      opacity: 1;
    }

    /* Expanded overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.95);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .overlay.open {
      display: flex;
    }
    .overlay-inner {
      max-width: 90vw;
      width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
      cursor: default;
    }
    .overlay-images {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }
    .overlay-images img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      border-radius: 4px;
    }
    .overlay-meta {
      padding: 4px 0;
    }
    .overlay-meta .meta-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .overlay-meta .meta-desc {
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .overlay-meta .meta-year {
      font-size: 13px;
      color: #999999;
    }

    @media (max-width: 768px) {
      .feed { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .page-title { font-size: 8vw; line-height: 9vw; }
      .back-nav { top: auto; bottom: 25px; right: 25px; }
      .overlay-images { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>
</head>
<body>

  <!-- Audio persistence -->
  <audio id="bg-audio" src="/song.mp3" loop></audio>
  <script>
    (function() {
      var audio = document.getElementById('bg-audio');
      var saved = localStorage.getItem('audioPlaying');
      var savedTime = parseFloat(localStorage.getItem('audioTime')) || 0;
      if (saved === 'true') {
        audio.currentTime = savedTime;
        audio.play().catch(function() {});
      }
      setInterval(function() {
        if (!audio.paused) localStorage.setItem('audioTime', audio.currentTime);
      }, 500);
      window.addEventListener('beforeunload', function() {
        localStorage.setItem('audioPlaying', !audio.paused);
        localStorage.setItem('audioTime', audio.currentTime);
      });
    })();
  </script>

  <!-- Back nav (always visible) -->
  <nav class="back-nav"><a href="index.html#content">&larr; Back</a></nav>

  <!-- Password gate -->
  <div class="password-gate" id="gate">
    <input type="password" id="pw-input" placeholder="password" autofocus>
    <div class="error" id="pw-error">try again</div>
  </div>

  <!-- Main content -->
  <div class="wrapper" id="main-wrapper">
    <h1 class="page-title">Bloopers*</h1>
    <div class="feed" id="feed"></div>
  </div>

  <!-- Expanded view overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-inner" id="overlay-inner"></div>
  </div>

  <!-- Cards icon SVG (two stacked rounded rectangles) -->
  <svg style="display:none">
    <symbol id="icon-cards" viewBox="0 0 24 24">
      <rect x="3" y="5" width="14" height="14" rx="2" fill="none" stroke="#fff" stroke-width="2"/>
      <rect x="7" y="1" width="14" height="14" rx="2" fill="#fff" stroke="#fff" stroke-width="1.5"/>
    </symbol>
  </svg>

  <script>
    // --- Password gate ---
    (function() {
      var gate = document.getElementById('gate');
      var input = document.getElementById('pw-input');
      var error = document.getElementById('pw-error');
      var wrapper = document.getElementById('main-wrapper');

      if (sessionStorage.getItem('bloopersAuth') === 'true') {
        gate.classList.add('hidden');
        wrapper.classList.add('visible');
      }

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          if (input.value.toLowerCase() === 'bloopers') {
            sessionStorage.setItem('bloopersAuth', 'true');
            gate.classList.add('hidden');
            wrapper.classList.add('visible');
          } else {
            error.classList.add('show');
            input.value = '';
            setTimeout(function() { error.classList.remove('show'); }, 2000);
          }
        }
      });
    })();

    // --- Bloopers data ---
    // cover: image shown in feed (can be same as first image)
    // coverHeight: optional CSS height for cover crop (e.g. '280px')
    // images: full images shown in expanded view
    var BLOOPERS = [
      // 2026
      {
        title: 'Arcade Careers Page',
        tag: 'Web Design',
        description: 'High fidelity design and prototype for the recruiting and careers page for the world\'s first AI physical product creation platform.',
        year: '2026',
        cover: '/bloopers/careers-1.png',
        images: ['/bloopers/careers-1.png', '/bloopers/careers-2.png']
      },
      {
        title: 'Arcade Furnish My Room',
        tag: 'Product Design',
        description: 'Furnish my room user flow concept for the world\'s first AI physical product creation platform.',
        year: '2026',
        cover: '/bloopers/furnish-1.png',
        images: ['/bloopers/furnish-1.png', '/bloopers/furnish-2.png', '/bloopers/furnish-3.png', '/bloopers/furnish-4.png', '/bloopers/furnish-5.png', '/bloopers/furnish-6.png', '/bloopers/furnish-7.png', '/bloopers/furnish-8.png']
      },
      {
        title: 'Arcade B2B Interior Design Landing Page',
        tag: 'Web Design',
        description: 'Interior designer targeted landing page for the world\'s first AI physical product creation platform.',
        year: '2026',
        cover: '/bloopers/interior-1.png',
        images: ['/bloopers/interior-1.png']
      },
      // 2025
      {
        title: 'Foresight',
        tag: 'Product Design',
        description: 'Dashboard for Foresight.',
        year: '2025',
        cover: '/bloopers/foresight-1.png',
        images: ['/bloopers/foresight-1.png', '/bloopers/foresight-2.png', '/bloopers/foresight-3.png', '/bloopers/foresight-4.png', '/bloopers/foresight-5.png']
      },
      {
        title: 'Arcade Dream Campaign',
        tag: 'Marketing Design',
        description: 'Social media campaign for the world\'s first AI physical product creation platform, educating people on the novel concept of prompt to product.',
        year: '2025',
        cover: '/bloopers/arcade-1.png',
        images: ['/bloopers/arcade-1.png', '/bloopers/arcade-2.png', '/bloopers/arcade-3.png', '/bloopers/arcade-4.png']
      },
      {
        title: 'Arcade Composer',
        tag: 'Product Design',
        description: 'Product creation prompting experience for the world\'s first AI physical product creation platform.',
        year: '2025',
        cover: '/bloopers/composer-1.png',
        images: ['/bloopers/composer-1.png', '/bloopers/composer-2.png', '/bloopers/composer-3.png', '/bloopers/composer-4.png', '/bloopers/composer-5.png', '/bloopers/composer-6.png', '/bloopers/composer-7.png']
      },
      {
        title: 'Arcade Library',
        tag: 'Product Design',
        description: 'Past creations and dreamboards storage concept for the world\'s first AI physical product creation platform.',
        year: '2025',
        cover: '/bloopers/library-1.png',
        images: ['/bloopers/library-1.png', '/bloopers/library-2.png']
      },
      {
        title: 'Arcade Social',
        tag: 'Product Design',
        description: 'High fidelity community feed design for the world\'s first AI physical product creation platform.',
        year: '2025',
        cover: '/bloopers/social-1.png',
        images: ['/bloopers/social-1.png']
      },
      // 2024
      {
        title: 'Mergen',
        tag: 'Product Design',
        description: 'User interface for Mergen, college readiness and preparation software.',
        year: '2024',
        cover: '/bloopers/mergen-1.png',
        images: ['/bloopers/mergen-1.png']
      },
      // 2023
      {
        title: 'Glean',
        tag: 'Brand Design',
        description: 'Blog post branding guidelines.',
        year: '2023',
        cover: '/bloopers/glean-1.png',
        images: ['/bloopers/glean-1.png', '/bloopers/glean-2.png']
      },
      // 2022
      {
        title: 'Buzz',
        tag: 'Product Design',
        description: 'Concept for a social platform for high schoolers.',
        year: '2022',
        cover: '/bloopers/buzz-1.png',
        images: ['/bloopers/buzz-1.png', '/bloopers/buzz-2.png']
      },
      {
        title: 'Krava',
        tag: 'Product Design',
        description: 'Concept for social food ranking and search app.',
        year: '2022',
        cover: '/bloopers/krava-1.png',
        images: ['/bloopers/krava-1.png', '/bloopers/krava-2.png', '/bloopers/krava-3.png', '/bloopers/krava-4.png']
      },
    ];

    // --- Render feed ---
    var feed = document.getElementById('feed');
    var overlay = document.getElementById('overlay');
    var overlayInner = document.getElementById('overlay-inner');

    BLOOPERS.forEach(function(item, idx) {
      var card = document.createElement('div');
      card.className = 'card';

      var img = document.createElement('img');
      img.src = item.cover;
      img.alt = item.title;
      img.loading = 'lazy';
      card.appendChild(img);

      // Hover overlay
      var hoverOverlay = document.createElement('div');
      hoverOverlay.className = 'card-overlay';
      card.appendChild(hoverOverlay);

      // Multi-image badge
      if (item.images.length > 1) {
        var badge = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        badge.setAttribute('class', 'card-badge');
        badge.setAttribute('viewBox', '0 0 24 24');
        badge.innerHTML = '<use href="#icon-cards"/>';
        card.appendChild(badge);
      }

      card.addEventListener('click', function() { openOverlay(idx); });
      feed.appendChild(card);
    });

    // --- Overlay ---
    function openOverlay(idx) {
      var item = BLOOPERS[idx];
      var html = '';

      // Determine grid columns based on image count
      var count = item.images.length;
      var cols;
      if (count === 1) cols = 1;
      else if (count === 2) cols = 2;
      else if (count <= 4) cols = count;
      else cols = 4;

      html += '<div class="overlay-images" style="grid-template-columns: repeat(' + cols + ', 1fr)">';
      item.images.forEach(function(src) {
        html += '<img src="' + src + '" alt="' + item.title + '">';
      });
      html += '</div>';

      // Meta
      html += '<div class="overlay-meta">';
      html += '<div class="meta-title">' + item.title + '</div>';
      html += '<div class="meta-desc">' + item.description + '</div>';
      html += '<div class="meta-year">' + item.year + '</div>';
      html += '</div>';

      overlayInner.innerHTML = html;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeOverlay() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeOverlay();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeOverlay();
    });
  </script>
</body>
</html>
