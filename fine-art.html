<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fine Art — Aayush Jain</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <style>
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow: hidden; }

    body {
      font-family: 'Kalice Trial', serif;
      background: #FFFFFF;
      color: #000000;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .back-nav {
      position: fixed;
      top: 0.625vw;
      right: 0.625vw;
      z-index: 200;
      font-size: 26px;
      line-height: 28px;
    }
    .back-nav a {
      text-decoration: none;
      color: #000000;
      transition: color 0.3s ease;
    }
    .back-nav a:hover { color: #999999; }

    .scroll-ui {
      position: fixed;
      bottom: 22px;
      right: 28px;
      z-index: 200;
      font-size: 18px;
      letter-spacing: -0.005em;
      color: #000000;
      opacity: 1;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    .gallery-viewport {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .art-piece {
      position: absolute;
      opacity: 0;
      will-change: opacity;
      display: flex;
      flex-direction: column;
    }

    .art-piece img {
      max-width: 75vw;
      max-height: 80vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .art-info {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0 0 0;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .art-piece img:hover ~ .art-info,
    .art-info:hover {
      opacity: 1;
    }

    .art-info .info-title,
    .art-info .info-medium {
      font-size: 14px;
      font-weight: 400;
      font-style: normal;
      color: #000000;
      letter-spacing: -0.005em;
    }

    @media (max-width: 768px) {
      .back-nav { top: auto; bottom: 25px; right: 25px; }
      .scroll-ui { bottom: 25px; left: 28px; right: auto; }

      .art-piece img {
        max-width: 88vw;
        max-height: 72vh;
      }

      .art-info { opacity: 1; }
      .art-info .info-title,
      .art-info .info-medium { font-size: 12px; }
    }
  </style>
</head>
<body>

  <nav class="back-nav">
    <a href="index.html#content">&larr; Back</a>
  </nav>

  <div class="scroll-ui">
    <span id="pct">0</span>%
  </div>

  <div class="gallery-viewport" id="gv"></div>

  <script>
  (function() {
    'use strict';

    const pieces = [
      { name: 'Emergence', medium: 'Installation', src: '/art/art-1-emergence.jpg' },
      { name: 'Egotism II', medium: 'Charcoal and Printmaking', src: '/art/art-2-egotism.jpg' },
      { name: 'Flux', medium: 'Acrylic and Jump Rope', src: '/art/art-3-flux.jpeg' },
      { name: 'Herself a Stranger Within', medium: 'Charcoal and Printmaking', src: '/art/art-4-stranger.jpg' },
      { name: 'Masked', medium: 'Charcoal and Printmaking', src: '/art/art-5-masked.jpg' },
      { name: 'Snatched', medium: 'Charcoal and Printmaking', src: '/art/art-9-snatched.jpg' },
      { name: 'Throw Me Back', medium: 'Spices', src: '/art/art-10-throw-me-back.jpg' },
      { name: 'Work 10.1', medium: 'Installation', src: '/art/art-11-work.jpg' },
      { name: 'Pot of Fatigue', medium: 'Ceramics', src: '/art/art-7-ceramics.jpg' },
      { name: 'Prayer for Hunger', medium: 'Brush Pen and Printmaking', src: '/art/art-6-prayer.jpg' },
    ];

    const N = pieces.length;
    const gv = document.getElementById('gv');
    const pctEl = document.getElementById('pct');
    const els = [];

    pieces.forEach(p => {
      const wrap = document.createElement('div');
      wrap.className = 'art-piece';

      const img = document.createElement('img');
      img.src = p.src;
      img.alt = p.name;
      img.loading = 'eager';
      wrap.appendChild(img);

      const info = document.createElement('div');
      info.className = 'art-info';
      info.innerHTML =
        `<span class="info-title">${p.name}</span>` +
        `<span class="info-medium">${p.medium}</span>`;
      wrap.appendChild(info);

      gv.appendChild(wrap);
      els.push(wrap);
    });

    // ===== SCROLL ENGINE =====
    let target = 0;
    let current = 0;
    let currentIndex = 0;
    let snapMode = false;
    const EASE_SCROLL = 0.08;
    const EASE_SNAP = 1.0;

    const seg = 1 / N;
    function goTo(i, snap) {
      currentIndex = Math.max(0, Math.min(N - 1, i));
      target = currentIndex === 0 ? 0 : (currentIndex + 0.5) * seg;
      target = Math.min(1, target);
      snapMode = !!snap;
    }
    function goNext(snap) { goTo(currentIndex + 1, snap); }
    function goPrev(snap) { goTo(currentIndex - 1, snap); }

    // Wheel: one scroll gesture = one piece
    let wheelCooldown = false;
    window.addEventListener('wheel', e => {
      e.preventDefault();
      if (wheelCooldown) return;
      wheelCooldown = true;
      if (e.deltaY > 0) goNext(false);
      else if (e.deltaY < 0) goPrev(false);
      setTimeout(() => { wheelCooldown = false; }, 400);
    }, { passive: false });

    // Touch: swipe snaps to next/prev
    let tY = 0;
    let touchMoved = false;
    window.addEventListener('touchstart', e => { tY = e.touches[0].clientY; touchMoved = false; }, { passive: true });
    window.addEventListener('touchmove', e => {
      e.preventDefault();
      const y = e.touches[0].clientY;
      const diff = tY - y;
      if (!touchMoved && Math.abs(diff) > 30) {
        touchMoved = true;
        if (diff > 0) goNext(false);
        else goPrev(false);
      }
    }, { passive: false });

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(true); }
      if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); goPrev(true); }
    });

    // ===== RENDER =====
    // Clean cut: one piece at a time. Each piece gets a segment of scroll.
    // Within each segment: fade in (first 15%), hold, fade out (last 15%).
    // No overlap — piece fully disappears before next appears.
    // First piece is visible at scroll=0.

    function smoothstep(a, b, x) {
      const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
      return t * t * (3 - 2 * t);
    }

    function render() {
      const ease = snapMode ? EASE_SNAP : EASE_SCROLL;
      const diff = target - current;
      if (Math.abs(diff) > 0.00002) {
        current += diff * ease;
      } else {
        current = target;
        snapMode = false;
      }

      pctEl.textContent = Math.round(current * 100);

      for (let i = 0; i < N; i++) {
        const start = i * seg;
        const end = (i + 1) * seg;
        const isFirst = (i === 0);
        const isLast = (i === N - 1);

        let opacity = 0;

        if (current >= start && current <= end) {
          // Fade-in zone: first 15% of segment (skip for first piece)
          const fadeInEnd = start + seg * 0.15;
          // Fade-out zone: last 15% of segment (skip for last piece)
          const fadeOutStart = end - seg * 0.15;

          if (isFirst) {
            // No fade-in, just hold then fade out
            opacity = isLast ? 1 : (1 - smoothstep(fadeOutStart, end, current));
          } else if (isLast) {
            // Fade in, then hold forever
            opacity = smoothstep(start, fadeInEnd, current);
          } else {
            // Fade in, hold, fade out
            const fadeIn = smoothstep(start, fadeInEnd, current);
            const fadeOut = 1 - smoothstep(fadeOutStart, end, current);
            opacity = Math.min(fadeIn, fadeOut);
          }
        }

        els[i].style.opacity = opacity;
        els[i].style.pointerEvents = opacity > 0.5 ? 'auto' : 'none';
      }

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  })();
  </script>
</body>
</html>
