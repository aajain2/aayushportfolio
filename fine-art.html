<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fine Art — Aayush Jain</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <style>
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow: hidden; }

    body {
      font-family: 'Kalice Trial', serif;
      background: #080808;
      color: #c8b895;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .gallery-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 22px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }
    .gallery-nav a {
      pointer-events: all;
      text-decoration: none;
      color: #c8b895;
      font-family: 'Kalice Trial', serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.02em;
      opacity: 0.6;
      transition: opacity 0.5s ease;
    }
    .gallery-nav a:hover { opacity: 1; }

    .gallery-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      padding: 22px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: #c8b895;
      opacity: 0.4;
      pointer-events: none;
      text-transform: uppercase;
    }
    .scroll-pct {
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    .gallery-viewport {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
    }

    .art-piece {
      position: absolute;
      opacity: 0;
      will-change: transform, opacity;
      overflow: hidden;
      box-shadow: 0 8px 60px rgba(0,0,0,0.6);
    }
    .art-piece img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .art-label {
      position: absolute;
      opacity: 0;
      will-change: opacity, transform;
      pointer-events: none;
    }
    .art-label .label-name {
      font-style: italic;
      font-size: 20px;
      line-height: 1.3;
      display: block;
      margin-bottom: 3px;
      letter-spacing: 0.01em;
    }
    .art-label .label-meta {
      font-size: 11px;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      line-height: 1.4;
    }

    .final-wrap {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      opacity: 0;
      will-change: opacity, transform;
      overflow: hidden;
    }
    .final-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .final-label {
      position: absolute;
      bottom: 70px; left: 28px;
      z-index: 10;
      opacity: 0;
      will-change: opacity;
    }
    .final-label .label-name {
      font-style: italic;
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
    }
    .final-label .label-meta {
      font-size: 12px;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    @media (max-width: 768px) {
      .gallery-nav { padding: 16px 18px; }
      .gallery-footer { padding: 16px 18px; }
      .art-label .label-name { font-size: 16px; }
      .final-label .label-name { font-size: 22px; }
      .final-label { bottom: 60px; left: 18px; }
    }
  </style>
</head>
<body>

  <nav class="gallery-nav">
    <a href="index.html">&larr; Back</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="gallery-footer">
    <span>&copy; All rights reserved.</span>
    <span class="scroll-pct">Scroll &mdash; <span id="pct">0</span>%</span>
  </div>

  <div class="gallery-viewport" id="gv"></div>

  <script>
  (function() {
    'use strict';

    // =============================================
    // PIECE DATA — 6 actual works
    // Aspect ratios from source files:
    //   1. Emergence: portrait  ~0.61:1
    //   2. Egotism II: landscape ~1.61:1
    //   3. Flux: landscape ~1.38:1
    //   4. Stranger Within: landscape ~1.30:1
    //   5. Masked: portrait ~0.75:1
    //   6. Prayer for Hunger: portrait ~0.77:1 (FINAL)
    // =============================================

    const pieces = [
      // --- Scene 1: Emergence from void (0% – 22%) ---
      {
        name: 'Emergence',
        medium: 'Charcoal & origami on paper',
        year: '',
        src: '/art/art-1-emergence.jpg',
        in: 0.01, peak: 0.08, out: 0.21,
        // Portrait piece, appears center-left, medium size
        x: 20, y: 18, w: 18, h: 50,
        drift: { x: 1.5, y: -2.5 }, depth: 0.3,
        labelOff: { x: 0, y: 53 },
      },

      // --- Scene 2: Egotism II (18% – 42%) ---
      {
        name: 'Egotism II',
        medium: 'Charcoal & mixed media',
        year: '',
        src: '/art/art-2-egotism.jpg',
        in: 0.17, peak: 0.26, out: 0.41,
        // Wide landscape, takes center stage
        x: 10, y: 18, w: 48, h: 38,
        drift: { x: 2, y: -3 }, depth: 0.1,
        labelOff: { x: 0, y: 41 },
      },
      // Small echo of Emergence visible alongside
      {
        name: '',
        medium: '',
        year: '',
        src: '/art/art-1-emergence.jpg',
        in: 0.20, peak: 0.28, out: 0.38,
        x: 68, y: 30, w: 9, h: 24,
        drift: { x: -1, y: -1 }, depth: 0.8,
        labelOff: { x: 0, y: 26 },
        noLabel: true,
      },

      // --- Scene 3: Flux diptych (38% – 60%) ---
      {
        name: 'Flux',
        medium: 'Mixed media',
        year: '',
        src: '/art/art-3-flux.jpeg',
        in: 0.37, peak: 0.46, out: 0.59,
        // Landscape diptych, wide center
        x: 15, y: 22, w: 42, h: 38,
        drift: { x: 0, y: -3 }, depth: 0.1,
        labelOff: { x: 0, y: 41 },
      },
      // Small companion — Egotism thumbnail
      {
        name: '',
        medium: '',
        year: '',
        src: '/art/art-2-egotism.jpg',
        in: 0.40, peak: 0.48, out: 0.56,
        x: 65, y: 42, w: 14, h: 11,
        drift: { x: -1.5, y: -1 }, depth: 0.7,
        labelOff: { x: 0, y: 13 },
        noLabel: true,
      },

      // --- Scene 4: Stranger Within + Masked (56% – 80%) ---
      {
        name: 'Herself a Stranger Within',
        medium: 'Charcoal & mixed media',
        year: '',
        src: '/art/art-4-stranger.jpg',
        in: 0.55, peak: 0.64, out: 0.79,
        // Landscape, left side
        x: 3, y: 14, w: 34, h: 32,
        drift: { x: 3, y: -2.5 }, depth: 0.15,
        labelOff: { x: 0, y: 35 },
      },
      {
        name: 'Masked',
        medium: 'Charcoal & collage',
        year: '',
        src: '/art/art-5-masked.jpg',
        in: 0.58, peak: 0.67, out: 0.79,
        // Portrait, right side
        x: 55, y: 10, w: 20, h: 42,
        drift: { x: -2, y: -2 }, depth: 0.3,
        labelOff: { x: 0, y: 44 },
      },
      // Tiny Flux echo
      {
        name: '',
        medium: '',
        year: '',
        src: '/art/art-3-flux.jpeg',
        in: 0.60, peak: 0.68, out: 0.76,
        x: 44, y: 55, w: 10, h: 9,
        drift: { x: -1, y: -1 }, depth: 0.85,
        labelOff: { x: 0, y: 11 },
        noLabel: true,
      },
    ];

    const finale = {
      name: 'Prayer for Hunger',
      medium: 'Charcoal, watercolor & collage',
      year: '',
      src: '/art/art-6-prayer.jpg',
      in: 0.77, full: 0.92,
    };

    // =============================================
    // DOM
    // =============================================

    const gv = document.getElementById('gv');
    const pctEl = document.getElementById('pct');
    const els = [];

    pieces.forEach(p => {
      const wrap = document.createElement('div');
      wrap.className = 'art-piece';
      const img = document.createElement('img');
      img.src = p.src;
      img.alt = p.name || '';
      img.loading = 'eager';
      img.draggable = false;
      wrap.appendChild(img);
      gv.appendChild(wrap);

      let lbl = null;
      if (!p.noLabel) {
        lbl = document.createElement('div');
        lbl.className = 'art-label';
        lbl.innerHTML =
          `<span class="label-name">${p.name}</span>` +
          (p.medium ? `<span class="label-meta">${p.medium}${p.year ? ', ' + p.year : ''}</span>` : '');
        gv.appendChild(lbl);
      }

      els.push({ wrap, lbl });
    });

    // Final piece
    const fWrap = document.createElement('div');
    fWrap.className = 'final-wrap';
    const fImg = document.createElement('img');
    fImg.src = finale.src;
    fImg.alt = finale.name;
    fImg.loading = 'eager';
    fImg.draggable = false;
    fWrap.appendChild(fImg);
    gv.appendChild(fWrap);

    const fLbl = document.createElement('div');
    fLbl.className = 'final-label';
    fLbl.innerHTML =
      `<span class="label-name">${finale.name}</span>` +
      `<span class="label-meta">${finale.medium}${finale.year ? ', ' + finale.year : ''}</span>`;
    gv.appendChild(fLbl);

    // =============================================
    // SCROLL ENGINE
    // =============================================

    let target = 0;
    let current = 0;
    const SPEED = 0.00028;
    const EASE = 0.055;

    window.addEventListener('wheel', e => {
      e.preventDefault();
      target += e.deltaY * SPEED;
      target = clamp(target);
    }, { passive: false });

    let tY = 0;
    window.addEventListener('touchstart', e => { tY = e.touches[0].clientY; }, { passive: true });
    window.addEventListener('touchmove', e => {
      e.preventDefault();
      const y = e.touches[0].clientY;
      target += (tY - y) * 0.0018;
      target = clamp(target);
      tY = y;
    }, { passive: false });

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); target = clamp(target + 0.025); }
      if (e.key === 'ArrowUp') { e.preventDefault(); target = clamp(target - 0.025); }
    });

    function clamp(v) { return Math.max(0, Math.min(1, v)); }

    // =============================================
    // MATH
    // =============================================

    function smoothstep(edge0, edge1, x) {
      const t = clamp((x - edge0) / (edge1 - edge0));
      return t * t * (3 - 2 * t);
    }

    function map(v, inMin, inMax, outMin, outMax) {
      return outMin + (outMax - outMin) * clamp((v - inMin) / (inMax - inMin));
    }

    // =============================================
    // RENDER
    // =============================================

    function render() {
      const diff = target - current;
      if (Math.abs(diff) > 0.00005) {
        current += diff * EASE;
      } else {
        current = target;
      }

      const p = current;
      pctEl.textContent = Math.round(p * 100);

      // Background: black → warm dark
      const br = Math.round(8 + p * 12);
      const bg = Math.round(8 + p * 8);
      const bb = Math.round(8 + p * 5);
      document.body.style.backgroundColor = `rgb(${br},${bg},${bb})`;

      const W = window.innerWidth;
      const H = window.innerHeight;

      // --- Pieces ---
      for (let i = 0; i < pieces.length; i++) {
        const pc = pieces[i];
        const el = els[i];

        const fadeInDur = 0.04;
        const fadeOutDur = 0.04;
        let opacity = 0;

        if (p >= pc.in && p <= pc.out) {
          const fadeIn = smoothstep(pc.in, pc.in + fadeInDur, p);
          const fadeOut = 1 - smoothstep(pc.out - fadeOutDur, pc.out, p);
          opacity = Math.min(fadeIn, fadeOut);
        }

        // Parallax drift
        const midP = (pc.in + pc.out) / 2;
        const rangeFactor = (p - midP) / ((pc.out - pc.in) / 2);
        const driftX = pc.drift.x * rangeFactor;
        const driftY = pc.drift.y * rangeFactor;

        // Scale breathing
        const scaleIn = map(p, pc.in, pc.peak, 0.92, 1);
        const scaleOut = map(p, pc.peak, pc.out, 1, 0.97);
        const scale = p <= pc.peak ? scaleIn : scaleOut;

        const px = (pc.x + driftX) / 100 * W;
        const py = (pc.y + driftY) / 100 * H;
        const pw = pc.w / 100 * W;
        const ph = pc.h / 100 * H;

        const blur = pc.depth * 1.5;

        const wrap = el.wrap;
        wrap.style.opacity = opacity;
        wrap.style.left = px + 'px';
        wrap.style.top = py + 'px';
        wrap.style.width = pw + 'px';
        wrap.style.height = ph + 'px';
        wrap.style.transform = `scale(${scale})`;
        wrap.style.filter = opacity > 0 ? `blur(${blur * (1 - opacity * 0.7)}px)` : '';

        // Label
        if (el.lbl) {
          const lblIn = pc.in + fadeInDur + 0.02;
          const lblOut = pc.out - fadeOutDur - 0.01;
          let lblOpacity = 0;
          if (p >= lblIn && p <= lblOut) {
            const fi = smoothstep(lblIn, lblIn + 0.03, p);
            const fo = 1 - smoothstep(lblOut - 0.02, lblOut, p);
            lblOpacity = Math.min(fi, fo) * 0.8;
          }
          el.lbl.style.opacity = lblOpacity;
          el.lbl.style.left = ((pc.x + pc.labelOff.x + driftX) / 100 * W) + 'px';
          el.lbl.style.top = ((pc.y + pc.labelOff.y + driftY) / 100 * H) + 'px';
          el.lbl.style.transform = `translateY(${(1 - lblOpacity) * 8}px)`;
        }
      }

      // --- Final piece ---
      let fOp = 0, fScale = 1, fLblOp = 0;
      if (p >= finale.in) {
        fOp = smoothstep(finale.in, finale.full, p);
        fScale = 0.82 + 0.18 * smoothstep(finale.in, finale.full, p);
        fLblOp = smoothstep(finale.in + 0.1, finale.full, p) * 0.85;
      }
      fWrap.style.opacity = fOp;
      fWrap.style.transform = `scale(${fScale})`;
      fLbl.style.opacity = fLblOp;
      fLbl.style.transform = `translateY(${(1 - fLblOp) * 12}px)`;

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  })();
  </script>
</body>
</html>
