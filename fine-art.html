<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fine Art — Aayush Jain</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <style>
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow: hidden; }

    body {
      font-family: 'Kalice Trial', serif;
      background: #FFFFFF;
      color: #000000;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .back-nav {
      position: fixed;
      top: 0.625vw;
      right: 0.625vw;
      z-index: 200;
      font-size: 26px;
      line-height: 28px;
    }
    .back-nav a {
      text-decoration: none;
      color: #000000;
    }

    .scroll-ui {
      position: fixed;
      bottom: 22px;
      right: 28px;
      z-index: 200;
      font-size: 14px;
      letter-spacing: 0.02em;
      color: #000000;
      opacity: 0.35;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    .gallery-viewport {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Each piece wrapper — centered, with hover info */
    .art-piece {
      position: absolute;
      opacity: 0;
      will-change: opacity;
      display: flex;
      flex-direction: column;
    }

    .art-piece img {
      max-width: 75vw;
      max-height: 80vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Info bar below image — only visible on hover */
    .art-info {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0 0 0;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .art-piece:hover .art-info {
      opacity: 1;
    }

    .art-info .info-title {
      font-size: 18px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    .art-info .info-medium {
      font-size: 14px;
      font-weight: 400;
      opacity: 0.5;
      letter-spacing: 0.02em;
    }

    @media (max-width: 768px) {
      .back-nav { top: auto; bottom: 25px; right: 25px; }
      .scroll-ui { bottom: 25px; left: 28px; right: auto; }

      .art-piece img {
        max-width: 88vw;
        max-height: 72vh;
      }

      /* Always show info on mobile (no hover) */
      .art-info {
        opacity: 1;
      }
      .art-info .info-title { font-size: 15px; }
      .art-info .info-medium { font-size: 12px; }
    }
  </style>
</head>
<body>

  <nav class="back-nav">
    <a href="index.html">&larr; Back</a>
  </nav>

  <div class="scroll-ui">
    Scroll &mdash; <span id="pct">0</span>%
  </div>

  <div class="gallery-viewport" id="gv"></div>

  <script>
  (function() {
    'use strict';

    const pieces = [
      { name: 'Emergence', medium: 'Mixed Media', src: '/art/art-1-emergence.jpg' },
      { name: 'Egotism II', medium: 'Charcoal & Mixed Media', src: '/art/art-2-egotism.jpg' },
      { name: 'Flux', medium: 'Mixed Media', src: '/art/art-3-flux.jpeg' },
      { name: 'Herself a Stranger Within', medium: 'Charcoal & Mixed Media', src: '/art/art-4-stranger.jpg' },
      { name: 'Masked', medium: 'Charcoal & Collage', src: '/art/art-5-masked.jpg' },
      { name: 'Prayer for Hunger', medium: 'Charcoal, Watercolor & Collage', src: '/art/art-6-prayer.jpg' },
    ];

    const N = pieces.length;
    const gv = document.getElementById('gv');
    const pctEl = document.getElementById('pct');
    const els = [];

    pieces.forEach(p => {
      const wrap = document.createElement('div');
      wrap.className = 'art-piece';

      const img = document.createElement('img');
      img.src = p.src;
      img.alt = p.name;
      img.loading = 'eager';
      wrap.appendChild(img);

      const info = document.createElement('div');
      info.className = 'art-info';
      info.innerHTML =
        `<span class="info-title">${p.name}</span>` +
        `<span class="info-medium">${p.medium}</span>`;
      wrap.appendChild(info);

      gv.appendChild(wrap);
      els.push(wrap);
    });

    // ===== SCROLL =====
    let target = 0;
    let current = 0;
    const SPEED = 0.00025;
    const EASE = 0.05;

    window.addEventListener('wheel', e => {
      e.preventDefault();
      target += e.deltaY * SPEED;
      target = Math.max(0, Math.min(1, target));
    }, { passive: false });

    let tY = 0;
    window.addEventListener('touchstart', e => { tY = e.touches[0].clientY; }, { passive: true });
    window.addEventListener('touchmove', e => {
      e.preventDefault();
      const y = e.touches[0].clientY;
      target += (tY - y) * 0.0015;
      target = Math.max(0, Math.min(1, target));
      tY = y;
    }, { passive: false });

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); target = Math.min(1, target + 0.02); }
      if (e.key === 'ArrowUp') { e.preventDefault(); target = Math.max(0, target - 0.02); }
    });

    // ===== RENDER =====
    // Each piece gets an equal segment of scroll.
    // Simple crossfade: fade in, hold, fade out. One at a time.
    const SEGMENT = 1 / N;

    function smoothstep(a, b, x) {
      const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
      return t * t * (3 - 2 * t);
    }

    function render() {
      const diff = target - current;
      if (Math.abs(diff) > 0.00003) {
        current += diff * EASE;
      } else {
        current = target;
      }

      pctEl.textContent = Math.round(current * 100);

      for (let i = 0; i < N; i++) {
        const start = i * SEGMENT;
        const end = (i + 1) * SEGMENT;
        const mid = (start + end) / 2;
        const isLast = (i === N - 1);

        let opacity = 0;

        if (current >= start && current <= end) {
          // Fade in over first 30% of segment, fade out over last 30%
          const fadeIn = smoothstep(start, start + SEGMENT * 0.30, current);
          const fadeOut = isLast
            ? 1
            : (1 - smoothstep(end - SEGMENT * 0.30, end, current));
          opacity = Math.min(fadeIn, fadeOut);
        }

        els[i].style.opacity = opacity;
        // Only allow hover interaction when piece is visible
        els[i].style.pointerEvents = opacity > 0.3 ? 'auto' : 'none';
      }

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  })();
  </script>
</body>
</html>
