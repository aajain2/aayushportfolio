<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fine Art — Aayush Jain</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <style>
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow: hidden; }

    body {
      font-family: 'Kalice Trial', serif;
      background: #FFFFFF;
      color: #000000;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* Same back-nav as contact page */
    .back-nav {
      position: fixed;
      top: 0.625vw;
      right: 0.625vw;
      z-index: 200;
      font-size: 26px;
      line-height: 28px;
    }
    .back-nav a {
      text-decoration: none;
      color: #000000;
    }

    /* Scroll counter bottom-right */
    .scroll-ui {
      position: fixed;
      bottom: 22px;
      right: 28px;
      z-index: 200;
      font-size: 14px;
      letter-spacing: 0.02em;
      color: #000000;
      opacity: 0.4;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    /* Viewport */
    .gallery-viewport {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
    }

    /* Art piece container */
    .art-piece {
      position: absolute;
      top: 50%;
      left: 50%;
      opacity: 0;
      will-change: transform, opacity;
      overflow: hidden;
      transform-origin: center center;
    }
    .art-piece img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Label */
    .art-label {
      position: absolute;
      opacity: 0;
      will-change: opacity, transform;
      pointer-events: none;
      text-align: center;
    }
    .art-label .label-name {
      font-style: italic;
      font-size: 22px;
      line-height: 1.3;
      display: block;
      margin-bottom: 3px;
    }
    .art-label .label-meta {
      font-size: 12px;
      opacity: 0.45;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    @media (max-width: 768px) {
      .back-nav { top: auto; bottom: 25px; right: 25px; }
      .scroll-ui { bottom: 25px; left: 28px; right: auto; }
      .art-label .label-name { font-size: 17px; }
    }
  </style>
</head>
<body>

  <nav class="back-nav">
    <a href="index.html">&larr; Back</a>
  </nav>

  <div class="scroll-ui">
    Scroll &mdash; <span id="pct">0</span>%
  </div>

  <div class="gallery-viewport" id="gv"></div>

  <script>
  (function() {
    'use strict';

    // =============================================
    // PIECES — in order, one at a time
    // Each piece: fades in small → grows to fill → exits to a side
    // Alternating exit direction (right, left, right, left...)
    // Last piece stays and fills viewport at 100%
    // =============================================

    const pieces = [
      {
        name: 'Emergence',
        medium: 'Charcoal & origami on paper',
        src: '/art/art-1-emergence.jpg',
        aspect: 1554 / 2562, // ~0.61 (portrait)
      },
      {
        name: 'Egotism II',
        medium: 'Charcoal & mixed media',
        src: '/art/art-2-egotism.jpg',
        aspect: 4698 / 2925, // ~1.61 (landscape)
      },
      {
        name: 'Flux',
        medium: 'Mixed media',
        src: '/art/art-3-flux.jpeg',
        aspect: 691 / 500, // ~1.38 (landscape)
      },
      {
        name: 'Herself a Stranger Within',
        medium: 'Charcoal & mixed media',
        src: '/art/art-4-stranger.jpg',
        aspect: 3128 / 2398, // ~1.30 (landscape)
      },
      {
        name: 'Masked',
        medium: 'Charcoal & collage',
        src: '/art/art-5-masked.jpg',
        aspect: 2549 / 3389, // ~0.75 (portrait)
      },
      {
        name: 'Prayer for Hunger',
        medium: 'Charcoal, watercolor & collage',
        src: '/art/art-6-prayer.jpg',
        aspect: 3226 / 4188, // ~0.77 (portrait)
      },
    ];

    const N = pieces.length;
    // Each piece gets an equal share of scroll, with overlap for transitions
    // Last piece stays at 100%
    const SEGMENT = 1 / N;

    // =============================================
    // DOM
    // =============================================

    const gv = document.getElementById('gv');
    const pctEl = document.getElementById('pct');
    const els = [];

    pieces.forEach((p, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'art-piece';
      const img = document.createElement('img');
      img.src = p.src;
      img.alt = p.name;
      img.loading = 'eager';
      wrap.appendChild(img);
      gv.appendChild(wrap);

      const lbl = document.createElement('div');
      lbl.className = 'art-label';
      lbl.innerHTML =
        `<span class="label-name">${p.name}</span>` +
        `<span class="label-meta">${p.medium}</span>`;
      gv.appendChild(lbl);

      els.push({ wrap, lbl });
    });

    // =============================================
    // SCROLL ENGINE — lerp
    // =============================================

    let target = 0;
    let current = 0;
    const SPEED = 0.00022;
    const EASE = 0.045;

    window.addEventListener('wheel', e => {
      e.preventDefault();
      target += e.deltaY * SPEED;
      target = Math.max(0, Math.min(1, target));
    }, { passive: false });

    let tY = 0;
    window.addEventListener('touchstart', e => { tY = e.touches[0].clientY; }, { passive: true });
    window.addEventListener('touchmove', e => {
      e.preventDefault();
      const y = e.touches[0].clientY;
      target += (tY - y) * 0.0015;
      target = Math.max(0, Math.min(1, target));
      tY = y;
    }, { passive: false });

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); target = Math.min(1, target + 0.02); }
      if (e.key === 'ArrowUp') { e.preventDefault(); target = Math.max(0, target - 0.02); }
    });

    // =============================================
    // MATH
    // =============================================

    function smoothstep(edge0, edge1, x) {
      const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
      return t * t * (3 - 2 * t);
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    // Quintic ease for ultra-smooth scale
    function ease5(t) {
      t = Math.max(0, Math.min(1, t));
      return t * t * t * (t * (t * 6 - 15) + 10);
    }

    // =============================================
    // RENDER
    // =============================================

    function render() {
      const diff = target - current;
      if (Math.abs(diff) > 0.00003) {
        current += diff * EASE;
      } else {
        current = target;
      }

      const p = current;
      pctEl.textContent = Math.round(p * 100);

      const W = window.innerWidth;
      const H = window.innerHeight;

      for (let i = 0; i < N; i++) {
        const piece = pieces[i];
        const el = els[i];
        const isLast = (i === N - 1);
        const exitsRight = (i % 2 === 0); // alternate: right, left, right...

        // This piece's scroll range
        const start = i * SEGMENT;
        const end = isLast ? 1.0 : (i + 1) * SEGMENT;
        const range = end - start;

        // Local progress 0→1 within this piece's range
        const local = Math.max(0, Math.min(1, (p - start) / range));

        // Skip if not in range at all (with slight buffer)
        if (p < start - 0.02 || (!isLast && p > end + 0.02)) {
          el.wrap.style.opacity = 0;
          el.lbl.style.opacity = 0;
          continue;
        }

        // ---- LIFECYCLE PHASES ----
        // Phase 1: 0.00 → 0.30  — Fade in, start small, centered
        // Phase 2: 0.30 → 0.65  — Grow large toward filling viewport
        // Phase 3: 0.65 → 1.00  — Exit: slide off to side (unless last piece)

        let opacity, scale, translateX, translateY;

        if (isLast) {
          // Last piece: fade in and grow to fill, then STAY at 100%
          // Phase 1: 0→0.4 fade in + grow
          // Phase 2: 0.4→1.0 fill viewport
          const fadeIn = smoothstep(0, 0.35, local);
          opacity = fadeIn;
          // Scale from small to covering viewport
          const growT = ease5(Math.max(0, Math.min(1, local / 0.9)));
          scale = lerp(0.15, 1.15, growT);
          translateX = 0;
          translateY = 0;
        } else {
          // Fade in (very gradual)
          const fadeIn = smoothstep(0, 0.30, local);
          // Fade out during exit
          const fadeOut = 1 - smoothstep(0.75, 1.0, local);
          opacity = Math.min(fadeIn, fadeOut);

          // Scale: small → large
          const growT = ease5(Math.max(0, Math.min(1, local / 0.70)));
          scale = lerp(0.12, 1.1, growT);

          // Exit slide
          const exitT = smoothstep(0.60, 1.0, local);
          const exitDir = exitsRight ? 1 : -1;
          translateX = exitT * exitDir * W * 0.6;
          translateY = 0;
        }

        // Compute pixel dimensions from scale
        // At scale=1.0 the image should be ~70% of viewport (large but framed)
        // At scale=1.1+ it overflows (nearly fills)
        const baseH = H * 0.70;
        const baseW = baseH * piece.aspect;
        // If too wide, constrain
        const maxW = W * 0.75;
        let finalW, finalH;
        if (baseW > maxW) {
          finalW = maxW;
          finalH = maxW / piece.aspect;
        } else {
          finalW = baseW;
          finalH = baseH;
        }

        const pixelW = finalW * scale;
        const pixelH = finalH * scale;

        el.wrap.style.opacity = opacity;
        el.wrap.style.width = pixelW + 'px';
        el.wrap.style.height = pixelH + 'px';
        el.wrap.style.transform =
          `translate(${-pixelW/2 + translateX}px, ${-pixelH/2 + translateY}px)`;

        // Label — centered below piece
        // Show during mid-phase (0.15 → 0.55)
        const lblFadeIn = smoothstep(0.12, 0.25, local);
        const lblFadeOut = isLast
          ? 1
          : (1 - smoothstep(0.50, 0.65, local));
        const lblOpacity = Math.min(lblFadeIn, lblFadeOut) * 0.9;

        el.lbl.style.opacity = lblOpacity;
        el.lbl.style.left = (W / 2 + translateX) + 'px';
        el.lbl.style.top = (H / 2 + pixelH / 2 + 20) + 'px';
        el.lbl.style.transform = `translate(-50%, ${(1 - lblOpacity) * 10}px)`;
      }

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  })();
  </script>
</body>
</html>
