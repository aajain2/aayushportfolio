<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aayush Jain</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <style>
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Kalice Trial';
      src: url('fonts/KaliceTrial-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Kalice Trial', serif;
      background: #FFFFFF;
      color: #000000;
      -webkit-font-smoothing: antialiased;
      max-width: 100vw;
      overflow-x: hidden;
    }

    /* ===== INTRO SECTION ===== */
    .intro-section {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .intro-text {
      font-family: 'Kalice Trial', serif;
      font-size: 7.2vw;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.005em;
      color: #000000;
      text-align: center;
      white-space: nowrap;
    }

    .scroll-hint {
      position: absolute;
      bottom: 3vh;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Kalice Trial', serif;
      font-size: 18px;
      font-weight: 400;
      color: #000000;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .scroll-hint.show {
      opacity: 1;
    }

    /* ===== CONTACT NAV ===== */
    .top-nav {
      position: fixed;
      top: 25px;
      right: 25px;
      z-index: 100;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.18;
      letter-spacing: -0.005em;
      opacity: 0;
      transition: opacity 0.6s ease;
      display: flex;
      gap: 10px;
    }

    .top-nav.visible {
      opacity: 1;
    }

    .top-nav a,
    .top-nav button {
      text-decoration: none;
      color: #000000;
      font-family: 'Kalice Trial', serif;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.18;
      letter-spacing: -0.005em;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.3s ease;
    }
    .top-nav a:hover,
    .top-nav button:hover { color: #999999; }

    /* ===== HORSE IMAGE SECTION ===== */
    .horse-scroll {
      position: relative;
      height: 400vh;
    }

    .horse-fixed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
    }

    .horse-fixed img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      will-change: transform;
    }

    /* ===== MAIN CONTENT ===== */
    .wrapper {
      max-width: 100vw;
      padding: 25px;
      padding-top: 3vh;
      position: relative;
      z-index: 20;
      background: #FFFFFF;
      margin-top: -100vh;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      grid-column-gap: 16px;
      grid-row-gap: 16px;
    }

    .full-width {
      grid-column: 1 / 15;
    }

    .headline {
      grid-column: 1 / 12;
      font-size: 4.8vw;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.1vw;
      margin-bottom: 14vw;
      position: relative;
    }

    #headline-visible {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
    }

    .left-bio {
      grid-column: 1 / 7;
      font-size: 26px;
      line-height: 28px;
      font-weight: 400;
      letter-spacing: -0.005em;
    }

    .left-bio strong {
      font-weight: 700;
      transition: color 0.3s ease;
      cursor: default;
    }
    .left-bio strong:hover { color: #999999; }
    .left-bio strong a {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    .right-bio {
      grid-column: 7 / 12;
      font-size: 26px;
      line-height: 28px;
      font-weight: 400;
      letter-spacing: -0.005em;
    }

    .links {
      grid-column: 13 / 15;
      font-size: 26px;
      line-height: 28px;
    }

    .links a {
      display: block;
      text-decoration: none;
      color: #000000;
      margin-bottom: 4px;
      transition: color 0.3s ease;
    }
    .links a:hover { color: #999999; }

    .section-heading {
      grid-column: 1 / 15;
      font-size: 4.8vw;
      font-weight: 400;
      line-height: 5vw;
      letter-spacing: -0.1vw;
      margin-top: 2vw;
    }

    hr {
      grid-column: 1 / 15;
      border: none;
      height: 2px;
      background: #000000;
      margin-top: 1vw;
    }

    hr.light { background: #CECECE; }

    .project-title {
      grid-column: 1 / 4;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: -0.005em;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .project-categories {
      grid-column: 4 / 7;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.18;
      letter-spacing: -0.005em;
    }

    .project-description {
      grid-column: 7 / 15;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.18;
      letter-spacing: -0.005em;
    }

    .project-description a {
      color: #000000;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .project-description a:hover { color: #999999; }

    .footer { margin-top: 20vh; }

    .footer h2 {
      font-size: 4.8vw;
      line-height: 5.2vw;
      letter-spacing: -0.1vw;
      font-weight: 400;
    }

    .footer h2 a {
      text-decoration: none;
      color: #000000;
      transition: color 0.3s ease;
    }
    .footer h2 a:hover { color: #999999; }

    /* ===== REVEAL ANIMATIONS ===== */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s cubic-bezier(0.25, 0.1, 0.25, 1),
                  transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }

    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 768px) {
      .headline {
        grid-column: 1 / 15;
        font-size: 10vw;
        min-height: auto;
        margin-bottom: 8vw;
      }

      .left-bio,
      .right-bio {
        grid-column: 1 / 15;
        font-size: 18px;
        line-height: 22px;
      }

      .links {
        grid-column: 1 / 15;
        margin-bottom: 4vw;
      }

      .section-heading {
        font-size: 10vw;
        line-height: 10.5vw;
      }

      .project-title,
      .project-categories,
      .project-description {
        grid-column: 1 / 15;
      }

      .project-title {
        margin-top: 8px;
      }

      .project-categories {
        font-weight: 400;
        margin-top: 4px;
      }

      .project-description {
        margin-top: 4px;
        margin-bottom: 8px;
      }

      .footer h2 {
        font-size: 8vw;
        line-height: 9vw;
      }

      .top-nav {
        position: fixed;
        top: 15px;
        right: 15px;
      }
    }
  </style>
</head>
<body>

  <nav class="top-nav" id="top-nav">
    <button id="play-btn" onclick="togglePlay()">{play}</button>
    <a href="contact.html">{contact}</a>
  </nav>
  <audio id="bg-audio" src="assets/song.mp3" loop></audio>

  <section class="horse-scroll" id="horse-scroll">
    <div class="intro-section" id="intro-section">
      <div class="intro-text" id="intro-text"></div>
      <div class="scroll-hint" id="scroll-hint">{scroll down}</div>
    </div>
    <div class="horse-fixed" id="horse-fixed">
      <img src="assets/contact-image.png" alt="" id="horse-img">
    </div>
  </section>

  <div class="wrapper" id="main-content">
    <div class="grid">
      <h1 class="headline" id="headline"><span id="headline-visible"></span><span id="headline-placeholder" style="visibility:hidden"></span></h1>
      <p class="left-bio reveal" id="left-bio"></p>
      <p class="right-bio reveal reveal-delay-1" id="right-bio"></p>
      <div class="links reveal reveal-delay-2" id="links"></div>
      <h2 class="section-heading reveal" id="section-heading"></h2>
      <hr class="full-width">
      <div id="projects-container"></div>
    </div>
    <div class="footer" id="footer"></div>
  </div>

  <script type="module">
    import C from './content.js';

    // Page title
    document.title = C.siteTitle;

    // Intro text (will be animated by typewriter script below)
    document.getElementById('intro-text').textContent = '[' + C.introShort + ']';

    // Left bio
    const leftBio = document.getElementById('left-bio');
    C.leftBio.forEach(part => {
      if (part.bold) {
        const strong = document.createElement('strong');
        if (part.url) {
          const a = document.createElement('a');
          a.href = part.url;
          a.textContent = part.text;
          a.target = '_blank';
          strong.appendChild(a);
        } else {
          strong.textContent = part.text;
        }
        leftBio.appendChild(strong);
      } else {
        leftBio.appendChild(document.createTextNode(part.text));
      }
    });

    // Right bio
    document.getElementById('right-bio').textContent = C.rightBio;

    // Links
    const linksEl = document.getElementById('links');
    C.links.forEach(link => {
      const a = document.createElement('a');
      a.href = link.url;
      a.target = '_blank';
      a.innerHTML = '&#x2197;&#xFE0E; ' + link.label;
      linksEl.appendChild(a);
    });

    // Section heading
    document.getElementById('section-heading').textContent = C.sectionHeading;

    // Projects
    const container = document.getElementById('projects-container');
    const grid = container.parentElement;
    C.projects.forEach((proj, i) => {
      if (i > 0) {
        const hr = document.createElement('hr');
        hr.className = 'full-width light';
        grid.insertBefore(hr, container);
      }

      const title = document.createElement('div');
      title.className = 'project-title reveal';
      title.textContent = proj.title;
      grid.insertBefore(title, container);

      const cats = document.createElement('p');
      cats.className = 'project-categories reveal reveal-delay-1';
      cats.textContent = proj.categories;
      grid.insertBefore(cats, container);

      const desc = document.createElement('p');
      desc.className = 'project-description reveal reveal-delay-2';
      desc.textContent = proj.description;
      if (proj.link) {
        desc.appendChild(document.createTextNode('\u00A0'));
        const a = document.createElement('a');
        a.href = proj.link.url;
        if (!proj.link.url.endsWith('.html')) a.target = '_blank';
        a.innerHTML = '&#x2197;&#xFE0E; ' + proj.link.label;
        desc.appendChild(a);
      }
      grid.insertBefore(desc, container);
    });
    container.remove();

    // Footer
    const footer = document.getElementById('footer');
    const h2a = document.createElement('h2');
    const emailLink = document.createElement('a');
    emailLink.href = 'mailto:' + C.email;
    emailLink.target = '_blank';
    emailLink.innerHTML = '&#x2197;&#xFE0E; ' + C.email;
    h2a.appendChild(emailLink);
    footer.appendChild(h2a);
    const h2b = document.createElement('h2');
    h2b.textContent = C.year;
    footer.appendChild(h2b);
  </script>

  <script>
    // Always start from top on main page load
    window.scrollTo(0, 0);
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

    // Global scroll lock state
    window.scrollLocked = false;
    window.scrollLockY = 0;

    // Heavy scroll feel — lerp-based smooth scrolling (desktop only)
    (function() {
      const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      if (isTouchDevice) return; // Use native scroll on mobile

      window.lerpTargetY = 0;
      window.lerpCurrentY = 0;
      const ease = 0.12; // lower = heavier

      window.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (window.scrollLocked) {
          window.lerpTargetY = window.scrollLockY;
          return;
        }
        window.lerpTargetY += e.deltaY;
        window.lerpTargetY = Math.max(0, Math.min(window.lerpTargetY, document.body.scrollHeight - window.innerHeight));
      }, { passive: false });

      function tick() {
        if (window.scrollLocked) {
          window.lerpTargetY = window.scrollLockY;
        }
        window.lerpCurrentY += (window.lerpTargetY - window.lerpCurrentY) * ease;
        if (Math.abs(window.lerpCurrentY - window.lerpTargetY) > 0.5) {
          window.scrollTo(0, window.lerpCurrentY);
        } else {
          window.lerpCurrentY = window.lerpTargetY;
          window.scrollTo(0, window.lerpCurrentY);
        }
        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();
  </script>

  <script type="module">
    // Intro typewriter animation
    import C from './content.js';

    const el = document.getElementById('intro-text');
    const wait = ms => new Promise(r => setTimeout(r, ms));

    async function run() {
      const short = C.introShort;
      const full = C.introFull;

      // Coming back from another page — skip intro, jump to content
      if (window.location.hash === '#content') {
        history.replaceState(null, '', window.location.pathname);
        el.textContent = '[' + full + ']';
        const wrapper = document.getElementById('main-content');
        requestAnimationFrame(() => {
          const pos = wrapper.offsetTop;
          window.scrollTo(0, pos);
          if (typeof window.lerpTargetY !== 'undefined') window.lerpTargetY = pos;
          if (typeof window.lerpCurrentY !== 'undefined') window.lerpCurrentY = pos;
          document.getElementById('top-nav').classList.add('visible');
          document.getElementById('headline-visible').textContent = C.headline;
          document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
        });
        return;
      }

      el.textContent = '[' + short + ']';
      await wait(1000);

      // Backspace short text character by character
      for (let i = short.length - 1; i >= 0; i--) {
        el.textContent = '[' + short.slice(0, i) + ']';
        await wait(120);
      }

      el.textContent = '[]';
      await wait(400);

      // Type out full name
      for (let i = 1; i <= full.length; i++) {
        el.textContent = '[' + full.slice(0, i) + ']';
        await wait(90);
      }

      await wait(600);
      document.getElementById('scroll-hint').classList.add('show');
    }

    run();

    let hintHidden = false;
    window.addEventListener('scroll', function() {
      if (!hintHidden && window.scrollY > 10) {
        hintHidden = true;
        document.getElementById('scroll-hint').classList.remove('show');
      }
    }, { passive: true });
  </script>

  <script>
    (function() {
      const section = document.getElementById('horse-scroll');
      const fixed = document.getElementById('horse-fixed');
      const img = document.getElementById('horse-img');
      const introText = document.getElementById('intro-text');

      function update() {
        const vh = window.innerHeight;
        const sectionH = section.offsetHeight;
        const scrolled = window.scrollY;
        const scrollRange = sectionH - vh;

        if (scrolled <= 0 || scrolled > scrollRange) {
          fixed.style.opacity = '0';
          introText.style.opacity = scrolled <= 0 ? '1' : '0';
          return;
        }

        const progress = scrolled / scrollRange; // 0 → 1

        // Fade out [Aayush Jain] quickly as image enters
        introText.style.opacity = Math.max(0, 1 - progress * 5);

        // Phase 1 (0 → 0.35): rise from below viewport, scale 0.3 → 1, fade in
        // Phase 2 (0.35 → 0.65): hold at full size
        // Phase 3 (0.65 → 1): shrink toward top, scale 1 → 0.3, fade out
        let scale, translateY, opacity;

        if (progress <= 0.35) {
          const p = progress / 0.35;
          const e = p * p * (3 - 2 * p);
          scale = 0.3 + 0.7 * e;
          translateY = (1 - e) * 100;
          opacity = Math.min(1, p * 2.5);
        } else if (progress <= 0.65) {
          scale = 1;
          translateY = 0;
          opacity = 1;
        } else {
          const p = (progress - 0.65) / 0.35;
          const e = p * p * (3 - 2 * p);
          scale = 1 - 0.7 * e;
          translateY = -e * 50;
          opacity = 1 - e;
        }

        fixed.style.opacity = opacity;
        img.style.transform = `translateY(${translateY}vh) scale(${scale})`;
      }

      window.addEventListener('scroll', update, { passive: true });
      update();
    })();
  </script>

  <script type="module">
    // Headline typewriter with scroll lock
    import C from './content.js';

    const visible = document.getElementById('headline-visible');
    const placeholder = document.getElementById('headline-placeholder');
    const wrapper = document.getElementById('main-content');
    const text = C.headline;
    let started = false;

    placeholder.textContent = text;

    const topNav = document.getElementById('top-nav');
    const obs = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && !started) {
        started = true;
        obs.unobserve(visible.parentElement);

        topNav.classList.add('visible');
        let i = 0;
        function type() {
          if (i <= text.length) {
            visible.textContent = text.slice(0, i);
            i++;
            setTimeout(type, 30);
          }
        }
        type();
      }
    }, { threshold: 0.1 });

    obs.observe(visible.parentElement);

    // Play/Pause toggle
    window.togglePlay = function() {
      const audio = document.getElementById('bg-audio');
      const btn = document.getElementById('play-btn');
      if (audio.paused) {
        audio.play();
        btn.textContent = '{pause}';
      } else {
        audio.pause();
        btn.textContent = '{play}';
      }
    };

    // Reveal on scroll
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
