<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aayush Jain</title>
  <link rel="icon" type="image/png" href="/assets/favicon-DSqbWA3t.png">
  <link rel="apple-touch-icon" href="/assets/favicon-DSqbWA3t.png">
  <style>
    @font-face {
      font-family: 'Kalice Trial';
      src: url('/assets/KaliceTrial-Regular-CfNMi4nZ.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Kalice Trial';
      src: url('/assets/KaliceTrial-Bold-BZPD-ai8.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Kalice Trial', serif;
      background: #FFFFFF;
      color: #000000;
      -webkit-font-smoothing: antialiased;
      max-width: 100vw;
      overflow-x: hidden;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.18;
    }
    .wrapper {
      max-width: 100vw;
      padding: 25px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .back-nav {
      position: fixed; top: 0.625vw; right: 0.625vw;
      z-index: 100; font-size: 26px; line-height: 28px;
    }
    .back-nav a { text-decoration: none; color: #000000; transition: color 0.3s ease; }
    .back-nav a:hover { color: #999999; }
    .contact-links { font-size: 26px; line-height: 28px; }
    .contact-links a { display: block; text-decoration: none; color: #000000; margin-bottom: 2px; transition: color 0.3s ease; }
    .contact-links a:hover { color: #999999; }
    .info-section { margin-top: 3vh; }
    .contact-image { width: 40vh; height: auto; display: block; margin-bottom: 12px; }
    .contact-note { width: 40vh; font-size: 22px; line-height: 25px; }
    .footer { margin-top: auto; padding-top: 3vh; }
    .footer h2 { font-size: 3.8vw; line-height: 4.2vw; letter-spacing: -0.1vw; font-weight: 400; }
    .footer h2 a { text-decoration: none; color: #000000; transition: color 0.3s ease; }
    .footer h2 a:hover { color: #999999; }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s cubic-bezier(0.25, 0.1, 0.25, 1),
                  transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }
  </style>
  <script type="module" crossorigin src="/assets/contact-Qg0jsCIy.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/content-DzYw4iIX.js">
</head>
<body>
  <nav class="back-nav"><a href="index.html#content" id="back-link"></a></nav>
  <div class="wrapper">
    <div class="contact-links reveal" id="contact-links"></div>
    <div class="info-section">
      <img src="/assets/contact-image-CEfT1x4y.png" alt="" id="contact-image" class="contact-image reveal reveal-delay-1">
      <p class="contact-note reveal reveal-delay-2" id="contact-note"></p>
    </div>
    <div class="footer" id="footer"></div>
  </div>

</body>
</html>
